name: CI Telemetry

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Simulate build
        run: |
          echo "Running build"
          sleep 2
          echo "Build finished"

      - name: Collect telemetry
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |

          mkdir -p telemetry

          REPO="$GITHUB_REPOSITORY"
          RUN_ID="$GITHUB_RUN_ID"
          RUN_NUMBER="$GITHUB_RUN_NUMBER"
          WORKFLOW="$GITHUB_WORKFLOW"
          EVENT="$GITHUB_EVENT_NAME"
          ACTOR="$GITHUB_ACTOR"
          BRANCH="$GITHUB_REF_NAME"
          COMMIT="$GITHUB_SHA"

          RUNNER_OS="$RUNNER_OS"
          RUNNER_ARCH="$RUNNER_ARCH"
          RUNNER_NAME="$RUNNER_NAME"

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          COMMIT_AUTHOR=$(git log -1 --pretty=format:'%an')
          COMMIT_MESSAGE=$(git log -1 --pretty=format:'%s')

          RUN_DATA=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/$REPO/actions/runs/$RUN_ID)

          JOB_DATA=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/$REPO/actions/runs/$RUN_ID/jobs)

          RUN_STATUS=$(echo "$RUN_DATA" | jq -r '.status')
          RUN_CONCLUSION=$(echo "$RUN_DATA" | jq -r '.conclusion')
          QUEUE_TIME=$(echo "$RUN_DATA" | jq -r '.created_at')

          JOB_STARTED=$(echo "$JOB_DATA" | jq -r '.jobs[0].started_at')
          JOB_COMPLETED=$(echo "$JOB_DATA" | jq -r '.jobs[0].completed_at')

          FILE="telemetry/${RUN_NUMBER}_ci_telemetry.json"

          jq -n \
            --arg repo "$REPO" \
            --arg workflow "$WORKFLOW" \
            --arg run_id "$RUN_ID" \
            --arg run_number "$RUN_NUMBER" \
            --arg event "$EVENT" \
            --arg actor "$ACTOR" \
            --arg branch "$BRANCH" \
            --arg commit "$COMMIT" \
            --arg commit_author "$COMMIT_AUTHOR" \
            --arg commit_message "$COMMIT_MESSAGE" \
            --arg status "$RUN_STATUS" \
            --arg conclusion "$RUN_CONCLUSION" \
            --arg queue_time "$QUEUE_TIME" \
            --arg runner_name "$RUNNER_NAME" \
            --arg runner_os "$RUNNER_OS" \
            --arg runner_arch "$RUNNER_ARCH" \
            --arg job_started "$JOB_STARTED" \
            --arg job_completed "$JOB_COMPLETED" \
            --arg timestamp "$TIMESTAMP" \
          '{
            repo: $repo,
            workflow: $workflow,
            run_id: $run_id,
            run_number: $run_number,
            event: $event,
            actor: $actor,
            branch: $branch,
            commit: $commit,
            commit_author: $commit_author,
            commit_message: $commit_message,
            status: $status,
            conclusion: $conclusion,
            queue_time: $queue_time,
            runner: {
              name: $runner_name,
              os: $runner_os,
              arch: $runner_arch
            },
            job: {
              started_at: $job_started,
              completed_at: $job_completed
            },
            timestamp: $timestamp
          }' > "$FILE"

          echo "Telemetry written to $FILE"

      - name: Upload telemetry artifact
        uses: actions/upload-artifact@v4
        with:
          name: telemetry-${{ github.run_number }}
          path: telemetry/*.json
